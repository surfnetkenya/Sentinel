<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL — Global Intelligence Platform</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --threat-red: #e82a2a;
  --threat-amber: #f5a623;
  --threat-green: #2ade6e;
  --bg: #060a0f;
  --bg2: #0a1018;
  --border: #1a2d3d;
  --text: #c8d8e8;
  --accent: #e8622a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Arial', sans-serif;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════════ */

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 24px;
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
}

.logo {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
  letter-spacing: 2px;
}

.threat-indicator {
  display: flex;
  gap: 12px;
  align-items: center;
}

/* ═══════════════════════════════════════════════════════════
   GLOBAL TENSION INDEX (NEW)
   ═══════════════════════════════════════════════════════════ */

.tension-widget {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 20px;
  min-width: 250px;
}

.tension-label {
  font-size: 11px;
  color: #7a9ab0;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.tension-gauge {
  position: relative;
  height: 40px;
  background: #0f1820;
  border-radius: 20px;
  overflow: hidden;
}

.tension-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--threat-green), var(--threat-amber), var(--threat-red));
  width: 0%;
  transition: width 0.8s ease;
  border-radius: 20px;
}

.tension-needle {
  position: absolute;
  top: 50%;
  left: 0%;
  transform: translate(-50%, -50%);
  width: 4px;
  height: 30px;
  background: white;
  border-radius: 2px;
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
  transition: left 0.8s ease;
}

.tension-value {
  position: absolute;
  top: 50%;
  right: 15px;
  transform: translateY(-50%);
  font-size: 16px;
  font-weight: bold;
  color: white;
  text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
}

/* ═══════════════════════════════════════════════════════════
   MAIN LAYOUT
   ═══════════════════════════════════════════════════════════ */

.main-container {
  display: grid;
  grid-template-columns: 350px 1fr;
  height: calc(100vh - 70px);
}

/* ═══════════════════════════════════════════════════════════
   SIDEBAR (Intelligence Feed)
   ═══════════════════════════════════════════════════════════ */

.sidebar {
  background: var(--bg2);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 20px;
}

.search-box {
  width: 100%;
  padding: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 14px;
  margin-bottom: 20px;
}

.analyze-btn {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 20px;
  transition: background 0.3s;
}

.analyze-btn:hover {
  background: #f0882a;
}

.analyze-btn:disabled {
  background: #555;
  cursor: not-allowed;
}

.feed-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 15px;
  margin-bottom: 15px;
  transition: all 0.3s;
}

.feed-item:hover {
  border-color: var(--accent);
}

/* SENTIMENT GLOW (NEW) */
.feed-item.critical-sentiment {
  border-color: var(--threat-red);
  box-shadow: 0 0 20px rgba(232, 42, 42, 0.6);
  animation: pulse-red 2s infinite;
}

@keyframes pulse-red {
  0%, 100% { box-shadow: 0 0 20px rgba(232, 42, 42, 0.6); }
  50% { box-shadow: 0 0 30px rgba(232, 42, 42, 0.9); }
}

.feed-title {
  font-size: 14px;
  font-weight: bold;
  color: var(--accent);
  margin-bottom: 8px;
}

.feed-summary {
  font-size: 13px;
  color: #9aa5b8;
  line-height: 1.5;
  margin-bottom: 10px;
}

.feed-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: #5a6576;
}

.sentiment-badge {
  padding: 4px 10px;
  border-radius: 3px;
  font-weight: bold;
  font-size: 10px;
  text-transform: uppercase;
}

.sentiment-positive { background: var(--threat-green); color: white; }
.sentiment-neutral { background: var(--threat-amber); color: white; }
.sentiment-negative { background: var(--threat-red); color: white; }

/* ═══════════════════════════════════════════════════════════
   MAP CONTAINER
   ═══════════════════════════════════════════════════════════ */

#mainMap {
  width: 100%;
  height: 100%;
  position: relative;
}

/* MAP FLASH ANIMATION (NEW) */
@keyframes map-flash {
  0%, 100% { filter: brightness(1); }
  25%, 75% { filter: brightness(1.5) hue-rotate(10deg); }
  50% { filter: brightness(2) hue-rotate(20deg); }
}

#mainMap.flash-alert {
  animation: map-flash 1s ease-in-out;
}

/* PULSING MARKER STYLES (NEW) */
.conflict-marker {
  border-radius: 50%;
  background: rgba(232, 42, 42, 0.6);
  border: 3px solid var(--threat-red);
  width: 30px;
  height: 30px;
  animation: pulse-marker 2s infinite;
}

@keyframes pulse-marker {
  0% { 
    transform: scale(1);
    opacity: 1;
  }
  50% { 
    transform: scale(1.5);
    opacity: 0.6;
  }
  100% { 
    transform: scale(1);
    opacity: 1;
  }
}

/* Loading Spinner */
.loading {
  text-align: center;
  padding: 20px;
  color: #7a9ab0;
  font-size: 13px;
}

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">⚠️ SENTINEL</div>
  
  <!-- GLOBAL TENSION INDEX WIDGET (NEW) -->
  <div class="tension-widget">
    <div class="tension-label">Global Tension Index</div>
    <div class="tension-gauge">
      <div class="tension-fill" id="tensionFill"></div>
      <div class="tension-needle" id="tensionNeedle"></div>
      <div class="tension-value" id="tensionValue">--</div>
    </div>
  </div>
</div>

<!-- MAIN CONTAINER -->
<div class="main-container">
  
  <!-- SIDEBAR (Intelligence Feed) -->
  <div class="sidebar">
    <input 
      type="text" 
      class="search-box" 
      id="searchInput" 
      placeholder="Enter intelligence query..."
    >
    
    <button class="analyze-btn" id="analyzeBtn" onclick="analyzeIntelligence()">
      🔍 ANALYZE INTELLIGENCE
    </button>
    
    <div id="feedContainer">
      <div class="loading">Awaiting analysis...</div>
    </div>
  </div>
  
  <!-- MAP -->
  <div id="mainMap"></div>
  
</div>

<script>
// ═══════════════════════════════════════════════════════════
// GLOBAL VARIABLES
// ═══════════════════════════════════════════════════════════

let mainMap;
let conflictMarkersLayer;
let sentimentHistory = []; // Store last 10 sentiment scores

// ═══════════════════════════════════════════════════════════
// HIGH-CONFLICT ZONE COORDINATES (Geocoding Lookup)
// ═══════════════════════════════════════════════════════════

const CONFLICT_ZONES = {
  'gaza': { lat: 31.5, lon: 34.45, name: 'Gaza Strip' },
  'gaza strip': { lat: 31.5, lon: 34.45, name: 'Gaza Strip' },
  'palestine': { lat: 31.9, lon: 35.2, name: 'Palestine' },
  'israel': { lat: 31.5, lon: 34.85, name: 'Israel' },
  'kyiv': { lat: 50.45, lon: 30.52, name: 'Kyiv' },
  'kiev': { lat: 50.45, lon: 30.52, name: 'Kyiv' },
  'ukraine': { lat: 50.45, lon: 30.52, name: 'Ukraine' },
  'russia': { lat: 55.75, lon: 37.62, name: 'Russia' },
  'moscow': { lat: 55.75, lon: 37.62, name: 'Moscow' },
  'donbas': { lat: 48.0, lon: 37.8, name: 'Donbas' },
  'donetsk': { lat: 48.0, lon: 37.8, name: 'Donetsk' },
  'taiwan': { lat: 25.03, lon: 121.56, name: 'Taiwan' },
  'syria': { lat: 33.51, lon: 36.29, name: 'Syria' },
  'damascus': { lat: 33.51, lon: 36.29, name: 'Damascus' },
  'iran': { lat: 35.69, lon: 51.42, name: 'Iran' },
  'tehran': { lat: 35.69, lon: 51.42, name: 'Tehran' },
  'yemen': { lat: 15.55, lon: 48.52, name: 'Yemen' },
  'iraq': { lat: 33.31, lon: 44.36, name: 'Iraq' },
  'baghdad': { lat: 33.31, lon: 44.36, name: 'Baghdad' },
  'afghanistan': { lat: 34.53, lon: 69.17, name: 'Afghanistan' },
  'kabul': { lat: 34.53, lon: 69.17, name: 'Kabul' },
  'china': { lat: 39.90, lon: 116.40, name: 'China' },
  'beijing': { lat: 39.90, lon: 116.40, name: 'Beijing' },
  'north korea': { lat: 39.04, lon: 125.76, name: 'North Korea' },
  'pyongyang': { lat: 39.04, lon: 125.76, name: 'Pyongyang' },
  'south korea': { lat: 37.57, lon: 126.98, name: 'South Korea' },
  'seoul': { lat: 37.57, lon: 126.98, name: 'Seoul' }
};

// ═══════════════════════════════════════════════════════════
// INITIALIZE MAP (Single Unified Instance)
// ═══════════════════════════════════════════════════════════

function initializeMap() {
  mainMap = L.map('mainMap', {
    center: [20, 0],
    zoom: 2,
    minZoom: 2,
    maxZoom: 18
  });
  
  // Dark map tiles
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'SENTINEL Intelligence',
    maxZoom: 19
  }).addTo(mainMap);
  
  // Layer group for conflict markers
  conflictMarkersLayer = L.layerGroup().addTo(mainMap);
  
  console.log('✅ Map initialized');
}

// ═══════════════════════════════════════════════════════════
// FEATURE 1: AUTOMATED GEOCODING & MAPPING
// ═══════════════════════════════════════════════════════════

function placeConflictMarkers(entities) {
  if (!entities || !entities.locations || entities.locations.length === 0) {
    console.log('No locations to map');
    return;
  }
  
  console.log('📍 Placing conflict markers for:', entities.locations);
  
  entities.locations.forEach(location => {
    const locationKey = location.toLowerCase();
    const coords = CONFLICT_ZONES[locationKey];
    
    if (coords) {
      // Create pulsing red marker
      const marker = L.circleMarker([coords.lat, coords.lon], {
        radius: 15,
        fillColor: '#e82a2a',
        color: '#fff',
        weight: 3,
        opacity: 1,
        fillOpacity: 0.6,
        className: 'conflict-marker'
      });
      
      marker.bindPopup(`
        <div style="font-family: Arial; padding: 10px;">
          <strong style="color: #e82a2a;">⚠️ ${coords.name}</strong><br>
          <span style="font-size: 12px; color: #555;">Conflict Zone Detected</span>
        </div>
      `);
      
      marker.addTo(conflictMarkersLayer);
      
      // Fly to first detected zone
      if (entities.locations.indexOf(location) === 0) {
        mainMap.flyTo([coords.lat, coords.lon], 6, {
          duration: 1.5
        });
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════
// FEATURE 2: VISUAL SENTIMENT INTEGRATION
// ═══════════════════════════════════════════════════════════

function applySentimentVisuals(sentiment, feedItemElement) {
  const polarity = sentiment.polarity;
  
  // Critical negative sentiment (below -0.4)
  if (polarity < -0.4) {
    console.log('🚨 Critical sentiment detected:', polarity);
    
    // Add red glow to feed item
    feedItemElement.classList.add('critical-sentiment');
    
    // Flash the map
    const mapElement = document.getElementById('mainMap');
    mapElement.classList.add('flash-alert');
    
    setTimeout(() => {
      mapElement.classList.remove('flash-alert');
    }, 1000);
  }
}

function getSentimentLabel(polarity) {
  if (polarity >= 0.1) return 'positive';
  if (polarity <= -0.1) return 'negative';
  return 'neutral';
}

// ═══════════════════════════════════════════════════════════
// FEATURE 3: GLOBAL TENSION INDEX
// ═══════════════════════════════════════════════════════════

function updateTensionIndex(polarity) {
  // Add to history (keep last 10)
  sentimentHistory.push(polarity);
  if (sentimentHistory.length > 10) {
    sentimentHistory.shift();
  }
  
  // Calculate average
  const average = sentimentHistory.reduce((sum, val) => sum + val, 0) / sentimentHistory.length;
  
  // Convert to 0-100 scale (more negative = higher tension)
  // -1 (very negative) = 100% tension
  // 0 (neutral) = 50% tension
  // +1 (very positive) = 0% tension
  const tensionPercent = Math.round((1 - average) * 50);
  
  // Update UI
  document.getElementById('tensionFill').style.width = tensionPercent + '%';
  document.getElementById('tensionNeedle').style.left = tensionPercent + '%';
  document.getElementById('tensionValue').textContent = tensionPercent + '%';
  
  console.log(`📊 Tension Index: ${tensionPercent}% (avg sentiment: ${average.toFixed(2)})`);
}

// ═══════════════════════════════════════════════════════════
// MAIN ANALYSIS FUNCTION
// ═══════════════════════════════════════════════════════════

async function analyzeIntelligence() {
  const query = document.getElementById('searchInput').value.trim();
  
  if (!query) {
    alert('Please enter an intelligence query');
    return;
  }
  
  const btn = document.getElementById('analyzeBtn');
  const feedContainer = document.getElementById('feedContainer');
  
  btn.disabled = true;
  btn.textContent = '⏳ ANALYZING...';
  feedContainer.innerHTML = '<div class="loading">Processing intelligence...</div>';
  
  // Clear old markers
  conflictMarkersLayer.clearLayers();
  
  try {
    // Call Vercel API
    const response = await fetch('/api', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'analyze',
        query: query
      })
    });
    
    if (!response.ok) {
      throw new Error(`API Error: ${response.status}`);
    }
    
    const data = await response.json();
    console.log('API Response:', data);
    
    // Create feed item
    const feedItem = document.createElement('div');
    feedItem.className = 'feed-item';
    
    const sentimentLabel = getSentimentLabel(data.sentiment.polarity);
    
    feedItem.innerHTML = `
      <div class="feed-title">${query}</div>
      <div class="feed-summary">${data.summary || 'Analysis complete'}</div>
      <div class="feed-meta">
        <span>Entities: ${data.entities?.locations?.join(', ') || 'None'}</span>
        <span class="sentiment-badge sentiment-${sentimentLabel}">
          ${sentimentLabel.toUpperCase()} (${data.sentiment.polarity.toFixed(2)})
        </span>
      </div>
    `;
    
    feedContainer.innerHTML = '';
    feedContainer.appendChild(feedItem);
    
    // FEATURE 1: Place conflict markers
    if (data.entities) {
      placeConflictMarkers(data.entities);
    }
    
    // FEATURE 2: Apply sentiment visuals
    if (data.sentiment) {
      applySentimentVisuals(data.sentiment, feedItem);
    }
    
    // FEATURE 3: Update tension index
    if (data.sentiment) {
      updateTensionIndex(data.sentiment.polarity);
    }
    
  } catch (error) {
    console.error('Analysis error:', error);
    feedContainer.innerHTML = `
      <div style="color: #e82a2a; padding: 15px; text-align: center;">
        ⚠️ Analysis failed<br>
        <span style="font-size: 11px; color: #7a9ab0;">${error.message}</span>
      </div>
    `;
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 ANALYZE INTELLIGENCE';
  }
}

// ═══════════════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════════════

window.addEventListener('load', () => {
  initializeMap();
  console.log('🚀 SENTINEL Phase 2 Loaded');
});

// Allow Enter key to trigger analysis
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      analyzeIntelligence();
    }
  });
});

</script>

</body>
</html>
