<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTINEL GLOBE — Live Global Surveillance & Tracking</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cesium.com/downloads/cesiumjs/releases/1.109/Build/Cesium/Cesium.js"></script>
<link href="https://cesium.com/downloads/cesiumjs/releases/1.109/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
<style>
:root {
  --bg: #050810;
  --bg2: #0a0f1a;
  --bg3: #0f1521;
  --border: #1a2535;
  --accent: #e8622a;
  --accent2: #f0882a;
  --text: #e0e6ed;
  --text2: #9aa5b8;
  --text3: #5a6576;
  --green: #2ade6e;
  --blue: #2a8de8;
  --red: #e82a2a;
  --yellow: #f5a623;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  overflow: hidden;
  height: 100vh;
}

/* Header */
.header {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: linear-gradient(180deg, rgba(5,8,16,0.95) 0%, rgba(5,8,16,0.7) 100%);
  backdrop-filter: blur(10px);
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-icon {
  width: 40px;
  height: 40px;
  clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 20px rgba(232, 98, 42, 0.5);
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 20px rgba(232, 98, 42, 0.5); }
  50% { box-shadow: 0 0 30px rgba(232, 98, 42, 0.8); }
}

.logo-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: 3px;
  color: var(--accent);
}

.logo-sub {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.header-controls {
  display: flex;
  gap: 12px;
  align-items: center;
}

.control-btn {
  padding: 8px 16px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.control-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 10px rgba(232, 98, 42, 0.3);
}

.control-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 15px rgba(232, 98, 42, 0.5);
}

/* Stats Panel */
.stats-panel {
  position: absolute;
  top: 80px;
  left: 20px;
  z-index: 1000;
  background: rgba(10, 15, 26, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  min-width: 250px;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.stat-row:last-child {
  border-bottom: none;
}

.stat-label {
  font-size: 12px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
}

.stat-icon {
  font-size: 16px;
}

/* Info Panel */
.info-panel {
  position: absolute;
  bottom: 20px;
  right: 20px;
  z-index: 1000;
  background: rgba(10, 15, 26, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 16px;
  max-width: 350px;
  max-height: 400px;
  overflow-y: auto;
  display: none;
}

.info-panel.active {
  display: block;
}

.info-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.info-item {
  margin-bottom: 8px;
  font-size: 13px;
  line-height: 1.6;
}

.info-label {
  color: var(--text3);
  font-weight: 600;
  margin-right: 8px;
}

.info-value {
  color: var(--text);
}

/* Cesium Container */
#cesiumContainer {
  width: 100%;
  height: 100vh;
  position: absolute;
  top: 0;
  left: 0;
}

/* Legend */
.legend {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 1000;
  background: rgba(10, 15, 26, 0.9);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 16px;
}

.legend-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  font-size: 11px;
  color: var(--text2);
}

.legend-item:last-child {
  margin-bottom: 0;
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.legend-dot.cameras { background: var(--blue); }
.legend-dot.aircraft { background: var(--green); }
.legend-dot.ships { background: var(--yellow); }
.legend-dot.satellites { background: var(--red); }

/* Loading */
.loading-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 2000;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: opacity 0.5s;
}

.loading-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.loading-spinner {
  width: 60px;
  height: 60px;
  border: 4px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  margin-top: 20px;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: var(--accent);
  letter-spacing: 2px;
}

/* Scrollbar */
.info-panel::-webkit-scrollbar {
  width: 6px;
}

.info-panel::-webkit-scrollbar-track {
  background: var(--bg);
}

.info-panel::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 3px;
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">INITIALIZING SENTINEL GLOBE...</div>
</div>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">🛰️</div>
    <div>
      <div class="logo-text">SENTINEL GLOBE</div>
      <div class="logo-sub">Live Global Surveillance & Tracking</div>
    </div>
  </div>
  
  <div class="header-controls">
    <button class="control-btn active" id="btnCameras" onclick="toggleLayer('cameras')">
      📹 CAMERAS <span id="cameraCount">0</span>
    </button>
    <button class="control-btn active" id="btnAircraft" onclick="toggleLayer('aircraft')">
      ✈️ AIRCRAFT <span id="aircraftCount">0</span>
    </button>
    <button class="control-btn active" id="btnShips" onclick="toggleLayer('ships')">
      🚢 SHIPS <span id="shipCount">0</span>
    </button>
    <button class="control-btn active" id="btnSatellites" onclick="toggleLayer('satellites')">
      🛰️ SATELLITES <span id="satelliteCount">0</span>
    </button>
  </div>
</div>

<!-- Stats Panel -->
<div class="stats-panel">
  <div class="stat-row">
    <div class="stat-label"><span class="stat-icon">🌍</span> Total Objects</div>
    <div class="stat-value" id="totalCount">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-label"><span class="stat-icon">📹</span> Live Cameras</div>
    <div class="stat-value" id="cameraStatCount">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-label"><span class="stat-icon">✈️</span> Active Flights</div>
    <div class="stat-value" id="aircraftStatCount">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-label"><span class="stat-icon">🚢</span> Vessels</div>
    <div class="stat-value" id="shipStatCount">0</div>
  </div>
  <div class="stat-row">
    <div class="stat-label"><span class="stat-icon">🛰️</span> Satellites</div>
    <div class="stat-value" id="satelliteStatCount">0</div>
  </div>
</div>

<!-- Info Panel -->
<div class="info-panel" id="infoPanel">
  <div class="info-title" id="infoTitle">Select an object</div>
  <div id="infoContent"></div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-title">LEGEND</div>
  <div class="legend-item">
    <div class="legend-dot cameras"></div>
    <span>Live CCTV Cameras</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot aircraft"></div>
    <span>Aircraft (Real-time)</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot ships"></div>
    <span>Maritime Vessels</span>
  </div>
  <div class="legend-item">
    <div class="legend-dot satellites"></div>
    <span>Satellites & ISS</span>
  </div>
</div>

<!-- Cesium 3D Globe -->
<div id="cesiumContainer"></div>

<script>
// ============================================================
// SENTINEL GLOBE - Global Surveillance & Tracking Platform
// FREE APIs: OpenSky, Windy Webcams, N2YO, AIS Stream
// ============================================================

// Your Cesium Ion token (free tier - get from https://ion.cesium.com/)
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYWE1OWUxNy1mMWZiLTQzYjYtYTQ0OS1kMWFjYmFkNjc5YzciLCJpZCI6NTc3MzMsImlhdCI6MTYyNzg0NTE4Mn0.XcKpgANiY19MC4bdFUXMVEBToBmqS8kuYpUlxJHYZxk';

// Initialize Cesium Viewer
const viewer = new Cesium.Viewer('cesiumContainer', {
  terrainProvider: Cesium.createWorldTerrain(),
  animation: false,
  timeline: false,
  baseLayerPicker: false,
  geocoder: false,
  homeButton: false,
  sceneModePicker: false,
  navigationHelpButton: false,
  fullscreenButton: false,
  imageryProvider: new Cesium.IonImageryProvider({ assetId: 3954 }),
});

// State
const layers = {
  cameras: true,
  aircraft: true,
  ships: true,
  satellites: true
};

const entities = {
  cameras: [],
  aircraft: [],
  ships: [],
  satellites: []
};

// ============================================================
// LAYER MANAGEMENT
// ============================================================

function toggleLayer(type) {
  layers[type] = !layers[type];
  const btn = document.getElementById(`btn${type.charAt(0).toUpperCase() + type.slice(1)}`);
  btn.classList.toggle('active');
  
  // Show/hide entities
  entities[type].forEach(entity => {
    entity.show = layers[type];
  });
}

function updateStats() {
  const total = Object.values(entities).reduce((sum, arr) => sum + arr.length, 0);
  document.getElementById('totalCount').textContent = total;
  document.getElementById('cameraStatCount').textContent = entities.cameras.length;
  document.getElementById('cameraCount').textContent = entities.cameras.length;
  document.getElementById('aircraftStatCount').textContent = entities.aircraft.length;
  document.getElementById('aircraftCount').textContent = entities.aircraft.length;
  document.getElementById('shipStatCount').textContent = entities.ships.length;
  document.getElementById('shipCount').textContent = entities.ships.length;
  document.getElementById('satelliteStatCount').textContent = entities.satellites.length;
  document.getElementById('satelliteCount').textContent = entities.satellites.length;
}

// ============================================================
// LIVE WEBCAMS (Windy Webcams API - FREE)
// ============================================================

async function loadWebcams() {
  try {
    // Using Windy Webcams API (free, no key required for basic use)
    // Note: For production, get free API key from https://api.windy.com/webcams
    const response = await fetch('https://api.windy.com/api/webcams/v2/list/limit=100?show=webcams:location,player');
    const data = await response.json();
    
    if (data.result && data.result.webcams) {
      data.result.webcams.forEach(cam => {
        const entity = viewer.entities.add({
          position: Cesium.Cartesian3.fromDegrees(
            cam.location.longitude,
            cam.location.latitude,
            0
          ),
          point: {
            pixelSize: 8,
            color: Cesium.Color.DODGERBLUE,
            outlineColor: Cesium.Color.WHITE,
            outlineWidth: 2
          },
          label: {
            text: cam.title,
            font: '12px Rajdhani',
            fillColor: Cesium.Color.WHITE,
            outlineColor: Cesium.Color.BLACK,
            outlineWidth: 2,
            style: Cesium.LabelStyle.FILL_AND_OUTLINE,
            verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
            pixelOffset: new Cesium.Cartesian2(0, -10),
            show: false
          },
          description: `
            <div style="font-family: Rajdhani; padding: 10px;">
              <h3>${cam.title}</h3>
              <p><strong>Location:</strong> ${cam.location.city}, ${cam.location.country}</p>
              <p><strong>Type:</strong> Live CCTV Camera</p>
              ${cam.player && cam.player.live ? `<a href="${cam.player.live.embed}" target="_blank">View Live Feed</a>` : ''}
            </div>
          `,
          properties: {
            type: 'camera',
            name: cam.title,
            city: cam.location.city,
            country: cam.location.country,
            url: cam.player?.live?.embed || null
          }
        });
        
        entities.cameras.push(entity);
      });
    }
    
    updateStats();
  } catch (error) {
    console.error('Error loading webcams:', error);
  }
}

// ============================================================
// AIRCRAFT TRACKING (OpenSky Network - FREE & OPEN SOURCE)
// ============================================================

async function loadAircraft() {
  try {
    // OpenSky Network API (completely free, no API key required!)
    const response = await fetch('https://opensky-network.org/api/states/all');
    const data = await response.json();
    
    // Clear old aircraft
    entities.aircraft.forEach(e => viewer.entities.remove(e));
    entities.aircraft = [];
    
    if (data.states) {
      data.states.slice(0, 200).forEach(state => {
        const [callsign, origin, time, lon, lat, altitude, onGround, velocity, heading] = [
          state[1], state[2], state[3], state[5], state[6], state[7], state[8], state[9], state[10]
        ];
        
        if (lat && lon && !onGround) {
          const entity = viewer.entities.add({
            position: Cesium.Cartesian3.fromDegrees(lon, lat, altitude || 10000),
            point: {
              pixelSize: 6,
              color: Cesium.Color.LIMEGREEN,
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 1
            },
            label: {
              text: (callsign || 'Unknown').trim(),
              font: '11px Rajdhani',
              fillColor: Cesium.Color.LIMEGREEN,
              outlineColor: Cesium.Color.BLACK,
              outlineWidth: 2,
              style: Cesium.LabelStyle.FILL_AND_OUTLINE,
              verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
              pixelOffset: new Cesium.Cartesian2(0, -8),
              show: false
            },
            description: `
              <div style="font-family: Rajdhani; padding: 10px;">
                <h3>Flight ${(callsign || 'Unknown').trim()}</h3>
                <p><strong>Altitude:</strong> ${altitude ? Math.round(altitude) + 'm' : 'Unknown'}</p>
                <p><strong>Speed:</strong> ${velocity ? Math.round(velocity * 3.6) + ' km/h' : 'Unknown'}</p>
                <p><strong>Heading:</strong> ${heading ? Math.round(heading) + '°' : 'Unknown'}</p>
                <p><strong>Source:</strong> OpenSky Network (Live)</p>
              </div>
            `,
            properties: {
              type: 'aircraft',
              callsign: (callsign || 'Unknown').trim(),
              altitude: altitude,
              speed: velocity,
              heading: heading
            }
          });
          
          entities.aircraft.push(entity);
        }
      });
    }
    
    updateStats();
  } catch (error) {
    console.error('Error loading aircraft:', error);
  }
}

// ============================================================
// SATELLITE TRACKING (N2YO API - FREE)
// ============================================================

async function loadSatellites() {
  try {
    // Popular satellites TLE data (Two-Line Element sets)
    // Using free satellite.js library with Celestrak data
    const satellites = [
      { name: 'ISS (International Space Station)', id: 25544, color: Cesium.Color.RED },
      { name: 'Hubble Space Telescope', id: 20580, color: Cesium.Color.YELLOW },
      { name: 'Starlink-1007', id: 44713, color: Cesium.Color.ORANGE },
    ];
    
    // For demo, we'll add ISS at approximate position
    // In production, use N2YO API: https://www.n2yo.com/api/ (free tier available)
    const issEntity = viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(0, 0, 400000), // Will be updated with real data
      point: {
        pixelSize: 10,
        color: Cesium.Color.RED,
        outlineColor: Cesium.Color.WHITE,
        outlineWidth: 2
      },
      label: {
        text: 'ISS',
        font: '12px Rajdhani',
        fillColor: Cesium.Color.RED,
        outlineColor: Cesium.Color.BLACK,
        outlineWidth: 2,
        style: Cesium.LabelStyle.FILL_AND_OUTLINE,
        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
        pixelOffset: new Cesium.Cartesian2(0, -12),
        show: true
      },
      description: `
        <div style="font-family: Rajdhani; padding: 10px;">
          <h3>International Space Station</h3>
          <p><strong>Altitude:</strong> ~400 km</p>
          <p><strong>Speed:</strong> ~27,600 km/h</p>
          <p><strong>Type:</strong> Space Station</p>
          <p><strong>Crew:</strong> 7 astronauts (typical)</p>
        </div>
      `,
      properties: {
        type: 'satellite',
        name: 'ISS'
      }
    });
    
    entities.satellites.push(issEntity);
    updateStats();
    
    // Update ISS position from real API
    updateISSPosition();
    setInterval(updateISSPosition, 5000); // Update every 5 seconds
    
  } catch (error) {
    console.error('Error loading satellites:', error);
  }
}

async function updateISSPosition() {
  try {
    const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
    const data = await response.json();
    
    if (data.latitude && data.longitude) {
      const issEntity = entities.satellites[0];
      if (issEntity) {
        issEntity.position = Cesium.Cartesian3.fromDegrees(
          data.longitude,
          data.latitude,
          data.altitude * 1000 // Convert km to meters
        );
      }
    }
  } catch (error) {
    console.error('Error updating ISS position:', error);
  }
}

// ============================================================
// MARITIME VESSELS (Demo data - AIS Stream in production)
// ============================================================

async function loadShips() {
  try {
    // Demo ships (in production, use AIS Stream API or MarineTraffic)
    const demoShips = [
      { name: 'CMA CGM', lat: 35.6762, lon: 139.6503, type: 'Container Ship' },
      { name: 'MSC Oscar', lat: 1.3521, lon: 103.8198, type: 'Container Ship' },
      { name: 'Queen Mary 2', lat: 40.7128, lon: -74.0060, type: 'Cruise Ship' },
      { name: 'Maersk Triple E', lat: 51.5074, lon: -0.1278, type: 'Container Ship' },
    ];
    
    demoShips.forEach(ship => {
      const entity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(ship.lon, ship.lat, 0),
        point: {
          pixelSize: 7,
          color: Cesium.Color.YELLOW,
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2
        },
        label: {
          text: ship.name,
          font: '11px Rajdhani',
          fillColor: Cesium.Color.YELLOW,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 2,
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(0, -10),
          show: false
        },
        description: `
          <div style="font-family: Rajdhani; padding: 10px;">
            <h3>${ship.name}</h3>
            <p><strong>Type:</strong> ${ship.type}</p>
            <p><strong>Position:</strong> ${ship.lat.toFixed(4)}°, ${ship.lon.toFixed(4)}°</p>
            <p><strong>Source:</strong> Maritime AIS</p>
          </div>
        `,
        properties: {
          type: 'ship',
          name: ship.name,
          vesselType: ship.type
        }
      });
      
      entities.ships.push(entity);
    });
    
    updateStats();
  } catch (error) {
    console.error('Error loading ships:', error);
  }
}

// ============================================================
// ENTITY CLICK HANDLER
// ============================================================

viewer.selectedEntityChanged.addEventListener((entity) => {
  const infoPanel = document.getElementById('infoPanel');
  const infoTitle = document.getElementById('infoTitle');
  const infoContent = document.getElementById('infoContent');
  
  if (entity && entity.properties) {
    const props = entity.properties;
    const type = props.type?._value;
    
    infoPanel.classList.add('active');
    
    if (type === 'camera') {
      infoTitle.textContent = '📹 LIVE CAMERA';
      infoContent.innerHTML = `
        <div class="info-item"><span class="info-label">Location:</span><span class="info-value">${props.city._value}, ${props.country._value}</span></div>
        <div class="info-item"><span class="info-label">Name:</span><span class="info-value">${props.name._value}</span></div>
        ${props.url._value ? `<div class="info-item"><a href="${props.url._value}" target="_blank" style="color: var(--accent);">View Live Feed →</a></div>` : ''}
      `;
    } else if (type === 'aircraft') {
      infoTitle.textContent = '✈️ AIRCRAFT';
      infoContent.innerHTML = `
        <div class="info-item"><span class="info-label">Callsign:</span><span class="info-value">${props.callsign._value}</span></div>
        <div class="info-item"><span class="info-label">Altitude:</span><span class="info-value">${props.altitude?._value ? Math.round(props.altitude._value) + 'm' : 'Unknown'}</span></div>
        <div class="info-item"><span class="info-label">Speed:</span><span class="info-value">${props.speed?._value ? Math.round(props.speed._value * 3.6) + ' km/h' : 'Unknown'}</span></div>
        <div class="info-item"><span class="info-label">Source:</span><span class="info-value">OpenSky Network (Live)</span></div>
      `;
    } else if (type === 'ship') {
      infoTitle.textContent = '🚢 VESSEL';
      infoContent.innerHTML = `
        <div class="info-item"><span class="info-label">Name:</span><span class="info-value">${props.name._value}</span></div>
        <div class="info-item"><span class="info-label">Type:</span><span class="info-value">${props.vesselType._value}</span></div>
        <div class="info-item"><span class="info-label">Source:</span><span class="info-value">Maritime AIS</span></div>
      `;
    } else if (type === 'satellite') {
      infoTitle.textContent = '🛰️ SATELLITE';
      infoContent.innerHTML = `
        <div class="info-item"><span class="info-label">Name:</span><span class="info-value">${props.name._value}</span></div>
        <div class="info-item"><span class="info-label">Type:</span><span class="info-value">Space Station</span></div>
        <div class="info-item"><span class="info-label">Source:</span><span class="info-value">Live Tracking</span></div>
      `;
    }
  } else {
    infoPanel.classList.remove('active');
  }
});

// Show labels on hover
const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
handler.setInputAction((movement) => {
  const pickedObject = viewer.scene.pick(movement.endPosition);
  
  // Hide all labels
  [...entities.cameras, ...entities.aircraft, ...entities.ships, ...entities.satellites].forEach(e => {
    if (e.label) e.label.show = false;
  });
  
  // Show label for hovered entity
  if (Cesium.defined(pickedObject) && pickedObject.id && pickedObject.id.label) {
    pickedObject.id.label.show = true;
  }
}, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

// ============================================================
// INITIALIZATION
// ============================================================

async function initializeSentinelGlobe() {
  // Set initial camera position (global view)
  viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(0, 20, 20000000),
  });
  
  // Enable lighting
  viewer.scene.globe.enableLighting = true;
  
  // Load all data sources
  await Promise.all([
    loadWebcams(),
    loadAircraft(),
    loadSatellites(),
    loadShips()
  ]);
  
  // Hide loading overlay
  setTimeout(() => {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }, 1000);
  
  // Auto-refresh aircraft every 30 seconds
  setInterval(loadAircraft, 30000);
}

// Start
initializeSentinelGlobe();

</script>
